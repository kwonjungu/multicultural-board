<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>꿀벌 소통창 · 통합 프로토타입</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
body, html { margin:0; padding:0; font-family:'Noto Sans KR', sans-serif; background:#E7E5E4; min-height:100vh; }
* { box-sizing:border-box; }
.stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

/* ── Phone frame (iPhone 14 Pro) ── */
.device-wrap.phone {
  width: 402px; height: 874px;
  border-radius: 48px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.25), 0 0 0 12px #1a1a1a, 0 0 0 14px #333;
}
.device-wrap.phone .device-screen { border-radius: 40px; }
.device-wrap.phone .notch { display: block; }

/* ── iPad portrait (iPad 11, 820×1180 @ 0.72 scale = 591×850) ── */
.device-wrap.tablet-portrait {
  width: 768px; height: 1024px;
  border-radius: 38px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.28), 0 0 0 14px #1a1a1a, 0 0 0 16px #2a2a2a;
  transform: scale(0.72); transform-origin: center center;
  margin: -140px 0;
}
.device-wrap.tablet-portrait .device-screen { border-radius: 26px; }

/* ── iPad landscape ── */
.device-wrap.tablet-landscape {
  width: 1180px; height: 820px;
  border-radius: 38px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.28), 0 0 0 14px #1a1a1a, 0 0 0 16px #2a2a2a;
  transform: scale(0.72); transform-origin: center center;
  margin: 0 -180px;
}
.device-wrap.tablet-landscape .device-screen { border-radius: 26px; }

.device-wrap {
  overflow: hidden;
  position: relative; background: #000;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.device-screen {
  position: absolute; inset: 0; overflow: hidden; background: #FFFBEB;
}
.notch { display: none; position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; border-radius: 24px; background: #000; z-index: 100; pointer-events: none; }
.home-indicator { display: none; }
.device-wrap.phone .home-indicator { display: block; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 139px; height: 5px; border-radius: 100px; background: rgba(0,0,0,0.25); z-index: 100; pointer-events: none; }

.label { position: fixed; top: 16px; left: 16px; z-index: 999; font-size: 13px; font-weight: 700; color: #57534E; background: #fff; padding: 8px 14px; border-radius: 999px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

/* ── Device switcher ── */
.device-switcher {
  position: fixed; top: 16px; right: 16px; z-index: 999;
  background: #fff; border-radius: 999px; padding: 4px;
  display: flex; gap: 2px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}
.device-switcher button {
  border: none; background: transparent;
  padding: 8px 14px; border-radius: 999px;
  font-size: 12px; font-weight: 700; color: #6B7280;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 5px;
  transition: all 0.18s;
}
.device-switcher button.active {
  background: linear-gradient(135deg, #F59E0B, #D97706); color: #fff;
  box-shadow: 0 3px 10px rgba(245,158,11,0.4);
}
.device-switcher button:hover:not(.active) { background: #FEF3C7; color: #92400E; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body>
<div class="label">🐝 꿀벌 소통창 · 태블릿 반응형 프로토타입</div>
<div class="device-switcher" id="deviceSwitcher">
  <button data-device="phone">📱 폰</button>
  <button data-device="tablet-portrait" class="active">📱 iPad 세로</button>
  <button data-device="tablet-landscape">📱 iPad 가로</button>
</div>
<div class="stage">
  <div class="device-wrap tablet-portrait" id="device">
    <div class="notch"></div>
    <div class="device-screen" id="root"></div>
    <div class="home-indicator"></div>
  </div>
</div>

<script>
// Device switcher — controls frame size AND broadcasts viewport mode to React via window event
(function() {
  const switcher = document.getElementById('deviceSwitcher');
  const device = document.getElementById('device');
  const current = () => {
    const c = device.className.match(/(phone|tablet-portrait|tablet-landscape)/);
    return c ? c[1] : 'tablet-portrait';
  };
  const apply = (kind) => {
    device.className = 'device-wrap ' + kind;
    [...switcher.querySelectorAll('button')].forEach(b => {
      b.classList.toggle('active', b.dataset.device === kind);
    });
    localStorage.setItem('bee_device', kind);
    window.dispatchEvent(new CustomEvent('bee:device', { detail: { kind } }));
  };
  // Restore
  const saved = localStorage.getItem('bee_device');
  if (saved) apply(saved);
  switcher.addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    apply(btn.dataset.device);
  });
  // Expose helper
  window.getDeviceKind = current;
})();
</script>

          width: 38, height: 38, borderRadius: 11, border: `2px solid ${game.color}44`,

                marginLeft: 8, fontSize: 11, fontWeight: 900, color: game.color,

                border: `1.5px solid ${game.color}55`,

        <div style={{
          height: 6, background: "rgba(0,0,0,0.06)", flexShrink: 0,

// ─────────────────────────────────────────────────────────────
// Game 1: CountryGuess — 두 언어로 나라 이름 듣고 국기 맞추기
// ─────────────────────────────────────────────────────────────
function CountryGuess({ game, viewerLang, friendLang, onExit }) {
  const [round, setRound] = useState(0);
  const [score, setScore] = useState(0);
  const [picked, setPicked] = useState(null);
  const [flash, setFlash] = useState(null); // "right" | "wrong" | null
  const TOTAL = 5;

  // 한 판에 5라운드
  const rounds = useMemo(() => {
    const picks = window.pickN(window.COUNTRIES, TOTAL);
    return picks.map(answer => {
      const distractors = window.pickN(window.COUNTRIES.filter(c => c.code !== answer.code), 3);
      const options = window.pickN([answer, ...distractors], 4);
      return { answer, options };
    });
  }, []);

  const cur = rounds[round];
  const done = round >= TOTAL;

  const pick = (c) => {
    if (picked) return;
    setPicked(c);
    const right = c.code === cur.answer.code;
    setFlash(right ? "right" : "wrong");
    if (right) setScore(s => s + 1);
    setTimeout(() => {
      setPicked(null); setFlash(null);
      setRound(r => r + 1);
    }, 1200);
  };

  if (done) {
    return (
      <GameShell game={game} viewerLang={viewerLang} friendLang={friendLang}
        progress={TOTAL} total={TOTAL} score={score} onExit={onExit}>
        <div style={{ textAlign: "center", paddingTop: 40 }}>
          <GameBeeMascot size={140} mood={score >= 4 ? "celebrate" : "cheer"}/>
          <div style={{ fontSize: 26, fontWeight: 900, color: "#1F2937", marginTop: 18 }}>
            {score === TOTAL ? "완벽해!" : score >= 3 ? "잘했어!" : "다시 해볼까?"} 🎉
          </div>
          <div style={{ fontSize: 16, color: "#92400E", fontWeight: 700, marginTop: 8 }}>
            ⭐ {score} / {TOTAL}
          </div>
          <div style={{ marginTop: 28, display: "flex", gap: 10, justifyContent: "center" }}>
            <button onClick={() => { setRound(0); setScore(0); }} style={{
              padding: "14px 24px", borderRadius: 16, border: "none",
              background: `linear-gradient(135deg, ${game.color}, ${game.color}cc)`,
              color: "#fff", fontSize: 15, fontWeight: 900, cursor: "pointer",
              boxShadow: `0 8px 20px ${game.color}66`,
            }}>🔄 다시 하기</button>
            <button onClick={onExit} style={{
              padding: "14px 24px", borderRadius: 16, border: `2px solid ${game.color}55`,
              background: "#fff", color: game.color, fontSize: 15, fontWeight: 900, cursor: "pointer",
            }}>🏠 게임룸으로</button>
          </div>
        </div>
      </GameShell>
    );
  }

  // 문제 문장: 친구의 언어로 "이 나라는 어디?" + 답을 친구 언어로 보여줌
  // 이렇게 하면 '친구 언어 → 내 언어'로 연결되는 학습 효과
  return (
    <GameShell game={game} viewerLang={viewerLang} friendLang={friendLang}
      progress={round} total={TOTAL} score={score} onExit={onExit}>
      <div style={{
        background: "#fff", borderRadius: 20, padding: "20px 18px",
        border: `2px solid ${game.color}22`, textAlign: "center",
        boxShadow: "0 6px 20px rgba(0,0,0,0.06)",
      }}>
        <div style={{ fontSize: 11, fontWeight: 900, color: game.color, letterSpacing: 1, marginBottom: 6 }}>
          {round + 1} / {TOTAL}
        </div>
        <div style={{ fontSize: 14, fontWeight: 700, color: "#6B7280", marginBottom: 8 }}>
          이 나라는 어디일까?
        </div>
        {/* 친구 언어로 */}
        <div style={{
          display: "inline-flex", alignItems: "center", gap: 8,
          background: "#DBEAFE", borderRadius: 14, padding: "10px 18px",
          border: "2px solid #60A5FA", marginBottom: 6,
        }}>
          <span style={{ fontSize: 14 }}>{window.KIDS_LANGUAGES[friendLang].flag}</span>
          <span style={{ fontSize: 24, fontWeight: 900, color: "#1E40AF" }}>
            {window.tr(cur.answer.names, friendLang)}
          </span>
          <button style={{
            background: "#fff", border: "1.5px solid #93C5FD", borderRadius: 10,
            padding: "4px 8px", fontSize: 14, cursor: "pointer",
          }}>🔊</button>
        </div>
        {/* 내 언어로 힌트 (토글) */}
        <div style={{ fontSize: 12, color: "#6B7280", fontWeight: 700 }}>
          {window.KIDS_LANGUAGES[viewerLang].flag} {window.tr(cur.answer.names, viewerLang)}
        </div>
      </div>

      <div style={{
        marginTop: 16, display: "grid",
        gridTemplateColumns: "1fr 1fr", gap: 10,
      }}>
        {cur.options.map(opt => {
          const isPicked = picked?.code === opt.code;
          const isAnswer = opt.code === cur.answer.code;
          let bg = "#fff", border = game.color + "33";
          if (flash) {
            if (isAnswer) { bg = "#D1FAE5"; border = "#10B981"; }
            else if (isPicked) { bg = "#FEE2E2"; border = "#EF4444"; }
          } else if (isPicked) { bg = game.bg; border = game.color; }
          return (
            <button key={opt.code} onClick={() => pick(opt)}
              style={{
                minHeight: 96, borderRadius: 18,
                background: bg, border: `3px solid ${border}`,
                cursor: picked ? "default" : "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                gap: 4, transition: "all 0.18s",
                boxShadow: "0 3px 10px rgba(0,0,0,0.05)",
              }}>
              <div style={{ fontSize: 48 }}>{opt.flag}</div>
              <div style={{ fontSize: 12, fontWeight: 800, color: "#1F2937" }}>
                {window.tr(opt.names, viewerLang)}
              </div>
            </button>
          );
        })}
      </div>

      {flash && (
        <div style={{
          marginTop: 14, padding: "12px 14px", borderRadius: 14,
          background: flash === "right" ? "#D1FAE5" : "#FEE2E2",
          border: `2px solid ${flash === "right" ? "#10B981" : "#EF4444"}`,
          textAlign: "center", fontSize: 14, fontWeight: 900,
          color: flash === "right" ? "#065F46" : "#991B1B",
        }}>
          {flash === "right" ? "🎉 맞았어! " : "💡 정답은 "} 
          <span>{cur.answer.flag} {window.tr(cur.answer.names, viewerLang)}</span>
        </div>
      )}
    </GameShell>
  );
}

// ─────────────────────────────────────────────────────────────
// Game 3: WordMemory — 메모리 카드 짝 맞추기 (한쪽=내 언어, 한쪽=친구 언어)
// ─────────────────────────────────────────────────────────────
function WordMemory({ game, viewerLang, friendLang, onExit }) {
  const PAIRS = 6;
  const cards = useMemo(() => {
    const picks = window.pickN(window.VOCAB, PAIRS);
    const deck = [];
    picks.forEach(v => {
      deck.push({ id: v.key + "-me",    word: v.key, lang: viewerLang, text: v.translations[viewerLang] || v.key, emoji: v.emoji });
      deck.push({ id: v.key + "-fr",    word: v.key, lang: friendLang, text: v.translations[friendLang] || v.key, emoji: v.emoji });
    });
    return deck.sort(() => Math.random() - 0.5);
  }, [viewerLang, friendLang]);

  const [flipped, setFlipped] = useState([]);   // indices currently flipped
  const [matched, setMatched] = useState([]);   // words already matched
  const [tries, setTries] = useState(0);
  const locked = flipped.length === 2;

  const flip = (i) => {
    if (locked) return;
    if (flipped.includes(i)) return;
    if (matched.includes(cards[i].word)) return;
    const next = [...flipped, i];
    setFlipped(next);
    if (next.length === 2) {
      setTries(t => t + 1);
      const [a, b] = next;
      if (cards[a].word === cards[b].word) {
        setTimeout(() => {
          setMatched(m => [...m, cards[a].word]);
          setFlipped([]);
        }, 500);
      } else {
        setTimeout(() => setFlipped([]), 900);
      }
    }
  };

  const done = matched.length === PAIRS;
  const L = window.KIDS_LANGUAGES;

  if (done) {
    return (
      <GameShell game={game} viewerLang={viewerLang} friendLang={friendLang}
        progress={PAIRS} total={PAIRS} score={tries} onExit={onExit}>
        <div style={{ textAlign: "center", paddingTop: 30 }}>
          <GameBeeMascot size={140} mood="celebrate"/>
          <div style={{ fontSize: 24, fontWeight: 900, color: "#1F2937", marginTop: 18 }}>짝을 다 찾았어! 🎉</div>
          <div style={{ fontSize: 15, color: "#6D28D9", fontWeight: 800, marginTop: 8 }}>
            {tries}번 만에 성공!
          </div>
          <div style={{ marginTop: 24, display: "flex", gap: 10, justifyContent: "center" }}>
            <button onClick={() => { setMatched([]); setFlipped([]); setTries(0); }} style={{
              padding: "14px 24px", borderRadius: 16, border: "none",
              background: `linear-gradient(135deg, ${game.color}, ${game.color}cc)`,
              color: "#fff", fontSize: 15, fontWeight: 900, cursor: "pointer",
              boxShadow: `0 8px 20px ${game.color}66`,
            }}>🔄 다시 하기</button>
            <button onClick={onExit} style={{
              padding: "14px 24px", borderRadius: 16, border: `2px solid ${game.color}55`,
              background: "#fff", color: game.color, fontSize: 15, fontWeight: 900, cursor: "pointer",
            }}>🏠 게임룸으로</button>
          </div>
        </div>
      </GameShell>
    );
  }

  return (
    <GameShell game={game} viewerLang={viewerLang} friendLang={friendLang}
      progress={matched.length} total={PAIRS} score={tries} onExit={onExit}>
      <div style={{
        textAlign: "center", marginBottom: 12,
        fontSize: 13, fontWeight: 800, color: "#6D28D9",
      }}>
        같은 뜻의 카드 두 장을 찾아봐! · {matched.length}/{PAIRS} 짝
      </div>
      <div style={{
        display: "grid",
        gridTemplateColumns: "repeat(3, 1fr)", gap: 8,
      }}>
        {cards.map((c, i) => {
          const isFlipped = flipped.includes(i) || matched.includes(c.word);
          const isMatched = matched.includes(c.word);

                  border: `3px solid ${isMatched ? "#10B981" : isMyLang ? "#F59E0B" : "#3B82F6"}`,

            </button>
          );
        })}
      </div>
    </GameShell>
  );
}

// ─────────────────────────────────────────────────────────────
// GameRoom — 전체 컨테이너 (lobby + game 라우팅)
// ─────────────────────────────────────────────────────────────
function GameRoom({ open, onClose, viewerLang }) {
  const [friendLang, setFriendLang] = useState(viewerLang === "vi" ? "ko" : "vi");
  const [activeGame, setActiveGame] = useState(null);

  useEffect(() => { if (!open) setActiveGame(null); }, [open]);
  useEffect(() => {
    if (friendLang === viewerLang) {
      setFriendLang(viewerLang === "ko" ? "vi" : "ko");
    }
  }, [viewerLang]);

  if (!open) return null;

  if (!activeGame) {
    return (
      <GameLobby
        viewerLang={viewerLang}
        friendLang={friendLang}
        setFriendLang={setFriendLang}
        onStart={(id) => setActiveGame(id)}
        onClose={onClose}
      />
    );
  }

  const game = GAME_LIST.find(g => g.id === activeGame);
  const exit = () => setActiveGame(null);
  const common = { game, viewerLang, friendLang, onExit: exit };

  switch (activeGame) {
    case "country": return <CountryGuess {...common}/>;
    case "emotion": return <EmotionQuiz {...common}/>;
    case "word":    return <WordMemory {...common}/>;
    default:        return <ComingSoon {...common}/>;
  }
}

window.GameRoom = GameRoom;

// useDevice — listens for the bee:device custom event from the
// frame switcher + initial reads from localStorage. All layouts
// in the app call this to pick phone/tabletPortrait/tabletLandscape
// variants. Also exposes convenience `isTablet`, `isLandscape`.
// ─────────────────────────────────────────────────────────────
function useDevice() {
  const [kind, setKind] = useState(() =>
    (typeof window !== "undefined" && window.getDeviceKind?.()) ||
    localStorage.getItem("bee_device") || "tablet-portrait"
  );
  useEffect(() => {
    const h = (e) => setKind(e.detail.kind);
    window.addEventListener("bee:device", h);
    return () => window.removeEventListener("bee:device", h);
  }, []);
  return {
    kind,
    isPhone: kind === "phone",
    isTablet: kind !== "phone",
    isLandscape: kind === "tablet-landscape",
    isPortrait: kind === "tablet-portrait" || kind === "phone",
  };
}

// ─────────────────────────────────────────────────────────────
// InterpreterDrawer — Papago-style voice translation helper (no server)
// Two-sided mirror UI: each side taps mic → STT → translate → TTS for the other.
// Not chat history. Not multi-user. Just a conversation aid, like 파파고 대화모드.
// ─────────────────────────────────────────────────────────────

// Demo voice samples — what STT would "hear"
const VOICE_SAMPLES = {
  ko: [
    { orig: "안녕! 너 이름이 뭐야?", to: { vi: "Xin chào! Bạn tên là gì?", en: "Hi! What's your name?", zh: "你好!你叫什么名字?", fil: "Kumusta! Ano ang pangalan mo?" } },
    { orig: "오늘 같이 놀래?", to: { vi: "Hôm nay chơi cùng nhau nhé?", en: "Want to play together today?", zh: "今天一起玩吗?", fil: "Gusto mo bang maglaro ngayon?" } },
    { orig: "이거 진짜 맛있어!", to: { vi: "Cái này ngon thật!", en: "This is really yummy!", zh: "这个真的很好吃!", fil: "Sobrang sarap nito!" } },
  ],
  vi: [
    { orig: "Mình tên là Lan. Còn bạn?", to: { ko: "내 이름은 란이야. 너는?", en: "My name is Lan. And you?", zh: "我叫Lan。你呢?", fil: "Ang pangalan ko ay Lan. Ikaw?" } },
    { orig: "Mình thích học tiếng Hàn lắm!", to: { ko: "나 한국어 공부하는 거 좋아해!", en: "I love studying Korean!", zh: "我很喜欢学韩语!", fil: "Mahilig akong mag-aral ng Korean!" } },
  ],

  ],
  zh: [
    { orig: "你今天过得怎么样?", to: { ko: "오늘 어떻게 지냈어?", vi: "Hôm nay bạn thế nào?", en: "How was your day?", fil: "Kumusta ang araw mo?" } },
  ],
  fil: [
    { orig: "Salamat sa tulong mo!", to: { ko: "도와줘서 고마워!", vi: "Cảm ơn bạn đã giúp đỡ!", en: "Thanks for your help!", zh: "谢谢你的帮助!" } },
  ],
};

function pickSample(lang) {
  const arr = VOICE_SAMPLES[lang] || VOICE_SAMPLES.ko;
  return arr[Math.floor(Math.random() * arr.length)];
}

// A single "side" in the mirror UI — shown from one participant's perspective
function InterpreterSide({ side, lang, otherLang, value, state, onStart, onStop, onReplay, flipped }) {
  const L = window.KIDS_LANGUAGES;
  const info = L[lang] || L.ko;
  const otherInfo = L[otherLang] || L.ko;
  const isMe = side === "me";

  const tint = isMe
    ? { bg: "linear-gradient(160deg, #FEF3C7 0%, #FDE68A 100%)", pri: "#F59E0B", priDark: "#D97706", ink: "#B45309", border: "#FCD34D" }
    : { bg: "linear-gradient(160deg, #DBEAFE 0%, #BFDBFE 100%)", pri: "#3B82F6", priDark: "#2563EB", ink: "#1E40AF", border: "#60A5FA" };

  const listening = state === "listening";
  const translating = state === "translating";
  const done = state === "done";

  return (
    <div style={{
      flex: 1, background: tint.bg, position: "relative", overflow: "hidden",
      display: "flex", flexDirection: "column", justifyContent: "space-between",
      padding: "16px 14px",
      transform: flipped ? "rotate(180deg)" : "none",
    }}>
      {/* soft honeycomb accent */}
      <svg style={{ position: "absolute", top: -10, right: -10, opacity: 0.18, pointerEvents: "none" }} width="140" height="140" viewBox="0 0 140 140">
        {[0,1,2].map(i => [0,1,2].map(j => {
          const x = i*44 + (j%2)*22 + 10; const y = j*38 + 10;
          return <polygon key={`${i}-${j}`} points={`${x+16},${y} ${x+32},${y+9} ${x+32},${y+28} ${x+16},${y+37} ${x},${y+28} ${x},${y+9}`} fill="none" stroke={tint.pri} strokeWidth="1.5"/>;
        }))}
      </svg>

      {/* Top: language indicator */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, zIndex: 2 }}>
        <div style={{
          width: 44, height: 44, borderRadius: 14, background: "#fff",
          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24,
          border: `2px solid ${tint.border}`, boxShadow: "0 3px 8px rgba(0,0,0,0.06)",
        }}>{info.flag}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: tint.ink, letterSpacing: 0.5 }}>
            {isMe ? "나 · 내 언어" : "친구 · 상대방 언어"}
          </div>
          <div style={{ fontSize: 15, fontWeight: 900, color: "#1F2937" }}>{info.label}</div>
        </div>
        <button style={{
          background: "#fff", border: `2px solid ${tint.border}`, borderRadius: 10,
          padding: "6px 10px", fontSize: 11, fontWeight: 800, color: tint.ink, cursor: "pointer",
        }}>{info.flag} ▾</button>
      </div>

      {/* Middle: transcript bubble */}
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "10px 4px", zIndex: 2 }}>
        {listening ? (
          <div style={{ textAlign: "center" }}>
            <div style={{ display: "flex", gap: 4, justifyContent: "center", marginBottom: 10, height: 44, alignItems: "center" }}>
              {Array.from({length: 16}).map((_, i) => (
                <div key={i} style={{
                  width: 4, borderRadius: 2, background: tint.pri,
                  animation: `wave ${0.7 + (i%4)*0.1}s ease-in-out ${i*0.05}s infinite alternate`,
                }}/>
              ))}
            </div>
            <div style={{ fontSize: 14, fontWeight: 800, color: tint.ink }}>
              🎧 듣고 있어요...
            </div>
          </div>
        ) : translating ? (
          <div style={{ textAlign: "center" }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
              {[0,1,2].map(i => (
                <div key={i} style={{
                  width: 9, height: 9, borderRadius: "50%", background: tint.pri,
                  animation: `typingDot 1.1s infinite ${i*0.15}s`,
                }}/>
              ))}
            </div>
            <div style={{ marginTop: 10, fontSize: 14, fontWeight: 800, color: tint.ink }}>
              🐝 꿀벌이 번역 중...
            </div>
          </div>
        ) : done && value ? (
          <div style={{ width: "100%" }}>
            {/* Translation (BIG — this is what the other side just said, translated to my language) */}
            <div style={{
              background: "#fff", borderRadius: 16, padding: "14px 14px",
              border: `2px solid ${tint.border}`,
              boxShadow: "0 4px 14px rgba(0,0,0,0.06)",
              fontSize: 19, fontWeight: 700, color: "#1F2937", lineHeight: 1.5,
              textAlign: "center",
            }}>
              {value.translation}
            </div>
            {/* Original (small, italic) */}
            <div style={{
              marginTop: 8, padding: "6px 10px", textAlign: "center",
              fontSize: 12, color: tint.ink, fontWeight: 500, fontStyle: "italic", opacity: 0.85,
            }}>
              "{value.original}"
            </div>
          </div>
        ) : (
          <div style={{ textAlign: "center", opacity: 0.8, padding: "0 10px" }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: tint.ink, lineHeight: 1.6, whiteSpace: "pre-line" }}>
              {isMe
                ? `마이크를 누르고\n${info.label}로 말해봐!`
                : `${info.flag} ${info.label}\n친구가 말할 차례예요`}
            </div>
          </div>
        )}
      </div>

      {/* Bottom: mic + replay */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, zIndex: 2 }}>
        {done && (
          <button onClick={onReplay} style={{
            width: 48, height: 48, borderRadius: 14, border: `2px solid ${tint.border}`,
            background: "#fff", color: tint.ink, fontSize: 20, cursor: "pointer",
            boxShadow: "0 3px 8px rgba(0,0,0,0.08)",
          }}>🔊</button>
        )}
        <button
          onClick={listening ? onStop : onStart}
          disabled={translating || (!isMe && state === "idle" && false)}
          style={{
            width: 76, height: 76, borderRadius: "50%", border: "none",
            background: listening
              ? "linear-gradient(135deg, #EF4444, #DC2626)"
              : `linear-gradient(135deg, ${tint.pri}, ${tint.priDark})`,
            color: "#fff", fontSize: 32, cursor: translating ? "wait" : "pointer",
            boxShadow: `0 12px 28px ${tint.pri}66, inset 0 -4px 0 rgba(0,0,0,0.15)`,
            animation: listening ? "recPulse 1.2s infinite" : "none",
            transition: "transform 0.12s",
          }}
          onMouseDown={e => !translating && (e.currentTarget.style.transform = "scale(0.94)")}
          onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
          onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
        >
          {listening ? "⏹" : "🎤"}
        </button>
        {done && <div style={{ width: 48 }}/>}
      </div>
    </div>
  );
}

function InterpreterDrawer({ open, onClose, viewerLang }) {
  const [partnerLang, setPartnerLang] = useState(viewerLang === "vi" ? "ko" : "vi");
  // state per side: idle | listening | translating | done
  const [meState, setMeState] = useState("idle");
  const [otherState, setOtherState] = useState("idle");
  const [meValue, setMeValue] = useState(null);       // what "나" said → shown on FRIEND's side (translated)
  const [otherValue, setOtherValue] = useState(null); // what friend said → shown on MY side (translated)
  const timers = useRef([]);
  const L = window.KIDS_LANGUAGES;
  const { isPhone, isTablet, isLandscape } = useDevice();

  // Layout mode:
  //   phone/portrait tablet → vertical mirror (top side flipped 180°)
  //   landscape tablet      → horizontal split (both sides upright, facing each other)
  const horizontal = isLandscape;

  const clearTimers = () => { timers.current.forEach(clearTimeout); timers.current = []; };
  useEffect(() => () => clearTimers(), []);

  // When ME taps mic: I speak my language → friend's side shows it translated to THEIR language
  const startMe = () => {
    if (meState !== "idle" && meState !== "done") return;
    clearTimers();
    setMeState("listening"); setMeValue(null);
    timers.current.push(setTimeout(() => stopMe(), 2600));
  };
  const stopMe = () => {
    setMeState("translating");
    timers.current.push(setTimeout(() => {
      const s = pickSample(viewerLang);
      // meValue = what ME produced, displayed on the FRIEND's side
      setMeValue({ original: s.orig, translation: s.to[partnerLang] || s.orig });
      setMeState("done"); setOtherState("done");
    }, 900));
  };

  // When FRIEND taps mic: they speak partner lang → my side shows it translated to MY language
  const startOther = () => {
    if (otherState !== "idle" && otherState !== "done") return;
    clearTimers();
    setOtherState("listening"); setOtherValue(null);
    timers.current.push(setTimeout(() => stopOther(), 2600));
  };
  const stopOther = () => {
    setOtherState("translating");
    timers.current.push(setTimeout(() => {
      const s = pickSample(partnerLang);
      // otherValue = what FRIEND produced, displayed on MY side
      setOtherValue({ original: s.orig, translation: s.to[viewerLang] || s.orig });
      setOtherState("done"); setMeState("done");
    }, 900));
  };

  const reset = () => {
    clearTimers();
    setMeState("idle"); setOtherState("idle");
    setMeValue(null); setOtherValue(null);
  };

  useEffect(() => { if (!open) reset(); }, [open]);

  const partnerLangs = Object.keys(L).filter(k => k !== viewerLang);

  return (
    <>
      <div onClick={onClose} style={{
        position: "absolute", inset: 0, background: "rgba(31,41,55,0.5)",
        opacity: open ? 1 : 0, pointerEvents: open ? "auto" : "none",
        transition: "opacity 0.25s", zIndex: 40,
      }}/>
      <div style={{
        position: "absolute", top: 0, right: 0, bottom: 0,
        width: isPhone ? "92%" : isLandscape ? "100%" : "86%",
        background: "#1F2937",
        transform: open ? "translateX(0)" : "translateX(100%)",
        transition: "transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)",
        zIndex: 41, display: "flex", flexDirection: "column",
        boxShadow: "-10px 0 40px rgba(0,0,0,0.25)",
      }}>
        {/* Header */}
        <div style={{
          padding: "52px 14px 10px",
          background: "#1F2937",
          display: "flex", alignItems: "center", gap: 10,
          flexShrink: 0,
        }}>
          <button onClick={onClose} style={{
            width: 40, height: 40, borderRadius: 12, border: "none",
            background: "rgba(255,255,255,0.12)", fontSize: 18, fontWeight: 900, color: "#fff", cursor: "pointer",
          }}>→</button>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 16, fontWeight: 900, color: "#fff", display: "flex", alignItems: "center", gap: 6 }}>
              🎙️ 통역 도우미 <span style={{
                fontSize: 9, fontWeight: 800, background: "#F59E0B", color: "#fff",
                padding: "2px 6px", borderRadius: 999,
              }}>BETA</span>
            </div>
            <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 600 }}>
              말하면 상대방 말로 바꿔줘요 · 서버에 저장 안 해요
            </div>
          </div>
          <button onClick={reset} style={{
            background: "rgba(255,255,255,0.12)", border: "none", borderRadius: 10,
            padding: "8px 10px", fontSize: 13, fontWeight: 800, color: "#fff", cursor: "pointer",
          }}>↻</button>
        </div>

        {/* Lang pair selector */}
        <div style={{
          padding: "8px 14px 10px", background: "#1F2937", borderBottom: "1px solid rgba(255,255,255,0.08)",
          display: "flex", alignItems: "center", gap: 6, flexShrink: 0,
        }}>
          <div style={{
            flex: 1, background: "rgba(245,158,11,0.2)", border: "1.5px solid rgba(245,158,11,0.4)",
            borderRadius: 10, padding: "7px 10px", display: "flex", alignItems: "center", gap: 6,
          }}>
            <span style={{ fontSize: 16 }}>{L[viewerLang].flag}</span>
            <span style={{ fontSize: 12, fontWeight: 800, color: "#FEF3C7" }}>{L[viewerLang].label}</span>
            <span style={{ fontSize: 9, fontWeight: 800, color: "#FCD34D", marginLeft: "auto" }}>나</span>
          </div>
          <div style={{ color: "#9CA3AF", fontSize: 16, fontWeight: 900 }}>⇅</div>
          <select
            value={partnerLang}
            onChange={e => { setPartnerLang(e.target.value); reset(); }}
            style={{
              flex: 1, background: "rgba(59,130,246,0.2)", border: "1.5px solid rgba(59,130,246,0.4)",
              borderRadius: 10, padding: "7px 10px", fontSize: 12, fontWeight: 800, color: "#DBEAFE",
              fontFamily: "inherit", cursor: "pointer", outline: "none",
              appearance: "none", WebkitAppearance: "none",
            }}>
            {partnerLangs.map(k => (
              <option key={k} value={k} style={{ color: "#1F2937" }}>
                {L[k].flag} {L[k].label} (친구)
              </option>
            ))}
          </select>
        </div>

        {/* Mirror layout — two sides.
            Vertical mode (phone/portrait): top side rotated 180° so friend across the table reads upright.
            Horizontal mode (landscape): both upright, sitting side-by-side on a table. */}
        <div style={{
          flex: 1,
          display: "flex",
          flexDirection: horizontal ? "row" : "column",
          position: "relative",
        }}>
          {/* Other side (friend).
              Shows meValue = what I said, translated into friend's language.
              Vertical: goes on top, flipped 180°.
              Horizontal: goes on left, upright. */}
          <InterpreterSide
            side="other"
            lang={partnerLang}
            otherLang={viewerLang}
            value={meValue}
            state={otherState}
            onStart={startOther}
            onStop={stopOther}
            onReplay={() => {}}
            flipped={!horizontal}
          />

          {/* Divider — horizontal bar in vertical mode, vertical bar in horizontal mode */}
          <div style={{
            ...(horizontal
              ? { width: 36, height: "auto", flexShrink: 0 }
              : { height: 32, width: "auto", flexShrink: 0 }),
            background: "#1F2937", position: "relative",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            <div style={{
              position: "absolute", inset: 0, display: "flex",
              alignItems: "center", justifyContent: "center",
              padding: horizontal ? "20px 0" : "0 20px",
              flexDirection: horizontal ? "column" : "row",
            }}>
              <div style={{
                flex: 1,
                ...(horizontal
                  ? { width: 1, height: "auto" }
                  : { height: 1, width: "auto" }),
                background: "rgba(255,255,255,0.12)", borderStyle: "dashed"
              }}/>
            </div>
            <div style={{
              background: "#1F2937",
              padding: horizontal ? "10px 0" : "0 12px",
              display: "flex", alignItems: "center", gap: 6, color: "#9CA3AF",
              fontSize: 10, fontWeight: 800, letterSpacing: 1,
              position: "relative",
              flexDirection: horizontal ? "column" : "row",
              writingMode: horizontal ? "vertical-rl" : "horizontal-tb",
              textOrientation: horizontal ? "mixed" : "initial",
            }}>
              <BeeMascot size={26} mood="happy" flying={false}/>
              서로 마주 보고 사용해요
            </div>
          </div>

          {/* Me side (bottom / right — always upright for me).
              Shows otherValue = what friend said, translated into my language. */}
          <InterpreterSide
            side="me"
            lang={viewerLang}
            otherLang={partnerLang}
            value={otherValue}
            state={meState}
            onStart={startMe}
            onStop={stopMe}
            onReplay={() => {}}
            flipped={false}
          />
        </div>

        {/* Footer hint */}
        <div style={{
          padding: "8px 14px 16px", background: "#1F2937", flexShrink: 0,
          textAlign: "center", fontSize: 10, color: "#6B7280", fontWeight: 600,
        }}>
          💡 파파고처럼 내 목소리를 친구 말로 바꿔 주는 도구예요
        </div>
      </div>
    </>
  );
}

        marginRight: isTablet ? "auto" : undefined,

          boxShadow: "0 12px 28px rgba(245,158,11,0.4), inset 0 -3px 0 rgba(0,0,0,0.15)",

          padding: isPhone ? "0 8px" : "0 18px",

          minWidth: isPhone ? 62 : 104, minHeight: s.actionMinH, borderRadius: isPhone ? 20 : 24, border: "none",

          color: "#fff",
          fontSize: isPhone ? 11 : 13, fontWeight: 900, cursor: "pointer", position: "relative",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2,

          {/* LIVE badge when in teacher mode & session hypothetically running */}

          <span style={{ fontSize: isPhone ? 10 : 13, lineHeight: 1 }}>통역</span>
        </button>

          minWidth: isPhone ? 62 : 96, minHeight: s.actionMinH, borderRadius: isPhone ? 20 : 24, border: "none",

// Post Modal (action selector + write screen)
// ─────────────────────────────────────────────────────────────
function PostModal({ open, onClose, onSent }) {
  const [step, setStep] = useState("action"); // action | write | success
  const [category, setCategory] = useState("today");
  const [text, setText] = useState("");

  useEffect(() => { if (!open) { setStep("action"); setText(""); } }, [open]);

  if (!open) return null;

  return (
    <div style={{
      position: "absolute", inset: 0, background: "rgba(31,41,55,0.5)",
      display: "flex", alignItems: "flex-end", zIndex: 50,
      animation: "fadeIn 0.2s",
    }}>
      <div style={{
        background: "#FFFBEB", width: "100%",
        borderTopLeftRadius: 28, borderTopRightRadius: 28,
        padding: "14px 20px 24px",
        boxShadow: "0 -10px 40px rgba(0,0,0,0.15)",
        maxHeight: "88%",
        display: "flex", flexDirection: "column",
        animation: "slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)",
      }}>
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}>
          <div style={{ width: 40, height: 5, background: "#FDE68A", borderRadius: 999 }}/>
        </div>

        {step === "action" && (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
              <BeeMascot size={52} mood="cheer"/>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 19, fontWeight: 900, color: "#1F2937" }}>무엇을 할까?</div>
                <div style={{ fontSize: 12, color: "#92400E", fontWeight: 600 }}>하고 싶은 걸 골라봐!</div>
              </div>
              <button onClick={onClose} style={{
                width: 36, height: 36, borderRadius: 12, border: "2px solid #FDE68A",
                background: "#fff", fontSize: 16, color: "#92400E", cursor: "pointer", fontWeight: 900,
              }}>✕</button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {[
                { icon: "✏️", label: "글쓰기", sub: "내 이야기", color: "#F59E0B", bg: "#FEF3C7", action: () => setStep("write") },
                { icon: "🎤", label: "말하기", sub: "목소리로", color: "#FB7185", bg: "#FFE4E6", action: () => setStep("write") },
                { icon: "📷", label: "사진", sub: "찰칵!", color: "#10B981", bg: "#D1FAE5", action: () => setStep("write") },
                { icon: "🎨", label: "그림", sub: "쓱쓱", color: "#A78BFA", bg: "#EDE9FE", action: () => setStep("write") },
              ].map((a, i) => (
                <button key={i} onClick={a.action} style={{
                  minHeight: 118, borderRadius: 20,
                  background: a.bg, border: `2px solid ${a.color}33`,
                  display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                  gap: 4, cursor: "pointer", transition: "transform 0.15s",
                }} onMouseDown={e => e.currentTarget.style.transform = "scale(0.96)"}
                   onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
                   onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
                  <div style={{ fontSize: 38 }}>{a.icon}</div>
                  <div style={{ fontSize: 17, fontWeight: 900, color: "#1F2937" }}>{a.label}</div>
                  <div style={{ fontSize: 11, color: a.color, fontWeight: 700 }}>{a.sub}</div>
                </button>
              ))}
            </div>

            {/* Category picker */}
            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#92400E", letterSpacing: 0.5, marginBottom: 8 }}>
                어디에 올릴까?
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                {[
                  { key: "intro", label: "🙋 자기소개", color: "#F59E0B" },
                  { key: "today", label: "💬 오늘", color: "#FB7185" },
                  { key: "praise", label: "🌟 칭찬", color: "#10B981" },
                ].map(c => (
                  <button key={c.key} onClick={() => setCategory(c.key)} style={{
                    flex: 1, minHeight: 40, borderRadius: 12,
                    background: category === c.key ? c.color : "#fff",
                    border: `2px solid ${c.color}`,
                    color: category === c.key ? "#fff" : c.color,
                    fontWeight: 800, fontSize: 12, cursor: "pointer",
                  }}>{c.label}</button>
                ))}
              </div>
            </div>
          </>
        )}

        {step === "write" && (
          <div style={{ display: "flex", flexDirection: "column", flex: 1, minHeight: 400 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <button onClick={() => setStep("action")} style={{
                width: 38, height: 38, borderRadius: 12, border: "2px solid #FDE68A",
                background: "#fff", fontSize: 16, fontWeight: 900, color: "#92400E", cursor: "pointer",
              }}>←</button>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 17, fontWeight: 900, color: "#1F2937" }}>내 이야기 쓰기</div>
                <div style={{ fontSize: 11, color: "#92400E", fontWeight: 600 }}>💬 오늘의 이야기</div>
              </div>
              <BeeMascot size={40} mood="think"/>
            </div>

            <button style={{
              width: "100%", minHeight: 72, borderRadius: 20,
              background: "linear-gradient(135deg, #FB7185, #EC4899)",
              color: "#fff", fontSize: 19, fontWeight: 900, border: "none",
              boxShadow: "0 10px 24px rgba(251,113,133,0.4)",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
              cursor: "pointer", marginBottom: 10,
            }}>
              <span style={{ fontSize: 30 }}>🎤</span> 말로 해볼래요
            </button>

            <div style={{ textAlign: "center", margin: "4px 0 10px", fontSize: 12, color: "#9CA3AF", fontWeight: 600 }}>
              ─── 또는 글로 쓰기 ───
            </div>

            <div style={{
              background: "#fff", borderRadius: 18, border: "3px solid #FDE68A",
              padding: "14px 16px", flex: 1, minHeight: 120,
              display: "flex", flexDirection: "column",
            }}>
              <textarea
                autoFocus
                value={text}
                onChange={e => setText(e.target.value)}
                placeholder="여기에 적어봐..."
                style={{
                  flex: 1, border: "none", outline: "none", resize: "none",
                  fontSize: 18, lineHeight: 1.6, color: "#1F2937", fontFamily: "inherit",
                  background: "transparent", fontWeight: 500,
                }}
              />
              <div style={{ display: "flex", alignItems: "center", gap: 8, paddingTop: 10, borderTop: "1px solid #F3F4F6" }}>
                <button style={{ width: 38, height: 38, borderRadius: 12, border: "2px solid #FDE68A", background: "#FFFBEB", fontSize: 16, cursor: "pointer" }}>📷</button>
                <button style={{ width: 38, height: 38, borderRadius: 12, border: "2px solid #FDE68A", background: "#FFFBEB", fontSize: 16, cursor: "pointer" }}>🎨</button>
                <div style={{ flex: 1 }}/>
                <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 700 }}>{text.length}자</div>
              </div>
            </div>

            <button onClick={() => { if (text.trim()) { setStep("success"); setTimeout(() => { onSent(); }, 1600); } }} disabled={!text.trim()} style={{
              width: "100%", minHeight: 62, borderRadius: 20, border: "none",
              background: text.trim() ? "linear-gradient(135deg, #F59E0B, #D97706)" : "#FEF3C7",
              color: text.trim() ? "#fff" : "#D1D5DB",
              fontSize: 19, fontWeight: 900,
              boxShadow: text.trim() ? "0 8px 24px rgba(245,158,11,0.4), inset 0 -3px 0 rgba(0,0,0,0.15)" : "none",
              cursor: text.trim() ? "pointer" : "not-allowed",
              marginTop: 12,
            }}>🐝 꿀벌에게 보내기</button>
          </div>
        )}

        {step === "success" && (
          <div style={{ padding: "30px 20px 20px", textAlign: "center", minHeight: 360, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <BeeMascot size={140} mood="celebrate"/>
            <div style={{ fontSize: 24, fontWeight: 900, color: "#1F2937", marginTop: 18 }}>잘했어요! 🎉</div>
            <div style={{ fontSize: 15, color: "#92400E", fontWeight: 600, marginTop: 8, lineHeight: 1.5 }}>
              친구들이 네 이야기를 읽고 있어!<br/>
              꿀벌이 5개 언어로 번역 중이에요 🐝
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    </div>

            width: "100%", padding: "12px 15px", borderRadius: 14,
            border: "2px solid #E5E7EB", fontSize: 14, color: "#111827",
            background: "#F9FAFB", outline: "none", boxSizing: "border-box",
            resize: "none", fontFamily: "inherit", lineHeight: 1.5, fontWeight: 500,
          }}/>

          <div style={{
            marginTop: 16, padding: "12px 14px",

            borderRadius: 14, border: "1.5px solid #FBBF24",
            display: "flex", gap: 10, alignItems: "center",

            <div style={{ flex: 1, fontSize: 12, color: "#78350F", fontWeight: 700, lineHeight: 1.4 }}>
              질문이 5개 언어로 자동 번역돼서 모든 친구가 자기 언어로 볼 수 있어요.

          </div>
        </div>

        <div style={{
          padding: "14px 22px 22px", borderTop: "1px solid #F3F4F6",
          display: "flex", gap: 10,

            background: "#F3F4F6", color: "#6B7280", fontWeight: 800,
            border: "none", cursor: "pointer",
          }}>취소</button>
          <button onClick={() => onStart(title, body)} disabled={!title.trim()} style={{
            flex: 1, minHeight: 54, borderRadius: 14, border: "none",
            background: !title.trim() ? "#F3F4F6" : "linear-gradient(135deg,#5B57F5,#8B5CF6)",

  );

// ═════════════════════════════════════════════════════════════
// Tweaks — host-toggled panel for switching views & roles
// ═════════════════════════════════════════════════════════════
function useTweaks() {
  const [tweaksOn, setTweaksOn] = useState(false);

  // Protocol: listener first, then announce availability
  useEffect(() => {
    const handler = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOn(true);
      else if (d.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", handler);
    window.parent?.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  return tweaksOn;
}

function TweaksPanel({ role, setRole, discussionView, setDiscussionView, viewerLang, setViewerLang }) {
  const L = window.KIDS_LANGUAGES;
  const VIEW_OPTS = [
    { id: "closed",       label: "닫힘",       emoji: "—" },
    { id: "submit",       label: "학생 입력",  emoji: "✍️" },
    { id: "submitted",    label: "학생 완료",  emoji: "🌱" },
    { id: "create",       label: "교사 생성",  emoji: "📝" },
    { id: "live-teacher", label: "교사 LIVE",  emoji: "📊" },
    { id: "reveal",       label: "🌳 공개",    emoji: "🌳" },
  ];
  return (
    <div style={{
      position: "fixed", bottom: 18, right: 18, zIndex: 9999,
      width: 280, background: "rgba(17,24,39,0.96)",
      border: "1px solid rgba(255,255,255,0.12)",
      borderRadius: 16, boxShadow: "0 20px 60px rgba(0,0,0,0.4)",
      padding: 14, backdropFilter: "blur(14px)",
      color: "#fff", fontFamily: "'Noto Sans KR', sans-serif",
    }}>
      <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: 0.6, color: "#FBBF24", marginBottom: 10 }}>
        ⚙️ TWEAKS
      </div>

      {/* Role */}
      <div style={{ fontSize: 10, fontWeight: 800, color: "#9CA3AF", marginBottom: 6 }}>역할</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        {["student", "teacher"].map((r) => (
          <button key={r} onClick={() => setRole(r)} style={{
            flex: 1, padding: "8px 0", borderRadius: 10, cursor: "pointer",
            background: role === r ? "linear-gradient(135deg,#5B57F5,#8B5CF6)" : "rgba(255,255,255,0.08)",
            border: role === r ? "none" : "1px solid rgba(255,255,255,0.12)",
            color: "#fff", fontSize: 12, fontWeight: 800, fontFamily: "inherit",
          }}>{r === "student" ? "🧒 학생" : "👩‍🏫 교사"}</button>
        ))}
      </div>

      {/* Discussion view */}
      <div style={{ fontSize: 10, fontWeight: 800, color: "#9CA3AF", marginBottom: 6 }}>💭 의견 나누기 화면</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5, marginBottom: 12 }}>
        {VIEW_OPTS.map((o) => (
          <button key={o.id} onClick={() => setDiscussionView(o.id)} style={{
            padding: "8px 6px", borderRadius: 9, cursor: "pointer",
            background: discussionView === o.id ? "#F59E0B" : "rgba(255,255,255,0.06)",
            border: discussionView === o.id ? "none" : "1px solid rgba(255,255,255,0.1)",
            color: discussionView === o.id ? "#78350F" : "#E5E7EB",
            fontSize: 11, fontWeight: 800, fontFamily: "inherit",
            display: "flex", alignItems: "center", gap: 4, justifyContent: "center",
          }}>
            <span>{o.emoji}</span>
            <span>{o.label}</span>
          </button>
        ))}
      </div>

      {/* Viewer lang */}
      <div style={{ fontSize: 10, fontWeight: 800, color: "#9CA3AF", marginBottom: 6 }}>내 언어</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
        {["ko","en","vi","zh","fil","ja"].map((c) => (
          <button key={c} onClick={() => setViewerLang(c)} style={{

// ─────────────────────────────────────────────────────────────
// Main Prototype (routing via state)
// ─────────────────────────────────────────────────────────────
function Prototype() {
  // Allow deep-linking via hash OR sessionStorage (preview harness strips query string + sometimes hash on reload)
  const hashParams = typeof window !== "undefined"
    ? new URLSearchParams((location.hash || "").replace(/^#/, ""))
    : null;
  const ss = typeof window !== "undefined" ? window.sessionStorage : null;
  const initScreen = hashParams?.get("screen") || ss?.getItem("bee_screen") || "board";
  const initView   = hashParams?.get("view")   || ss?.getItem("bee_view")   || "reveal";
  const initRole   = hashParams?.get("role")   || ss?.getItem("bee_role")   || "student";
  const [screen, setScreen] = useState(initScreen); // welcome | numpad | lang | board
  const [roomCode, setRoomCode] = useState("1234");
  const [viewerLang, setViewerLang] = useState("ko");
  const [modalOpen, setModalOpen] = useState(false);
  const [interpreterOpen, setInterpreterOpen] = useState(false);
  const [gameRoomOpen, setGameRoomOpen] = useState(false);

  // ── Discussion state ──
  // Role can be toggled via Tweaks
  const [role, setRole] = useState(initRole); // student | teacher
  // Discussion view state (controlled; can be forced via Tweaks)
  const [discussionView, setDiscussionView] = useState(initView);
  // closed | create (teacher) | live-teacher (teacher live panel) | submit (student) | submitted (student) | reveal (🌳)
  const [myResponseText, setMyResponseText] = useState("");
  const [responses, setResponses] = useState(SAMPLE_RESPONSES);
  const [presence, setPresence] = useState(SAMPLE_PRESENCE);

  // Open the correct discussion screen based on role (called from board action bar)
  function openDiscussion() {
    if (role === "teacher") {
      // If no session yet, create one; else show live panel
      setDiscussionView("create");
    } else {
      // Student: go to submit (or submitted if already done)
      setDiscussionView(myResponseText ? "submitted" : "submit");
    }
  }

  function handleStartSession() {
    setDiscussionView("live-teacher");
  }

  function handleSubmitResponse(text) {
    setMyResponseText(text);
    // Append student-added response so tree reveal feels personal
    setResponses((prev) => [
      ...prev,
      { id: "me", authorName: "나", authorLang: viewerLang, text,
        translations: { [viewerLang]: text } },
    ]);
    setPresence((prev) => [
      ...prev.filter((p) => p.cid !== "me"),
      { cid: "me", name: "나", submitted: true },
    ]);
    setDiscussionView("submitted");
  }

  function handleRevealTree() { setDiscussionView("reveal"); }
  function closeDiscussion() { setDiscussionView("closed"); }

  // Tweaks — role & forced discussion view
  const tweaksOn = useTweaks();

  let screenEl;
  switch (screen) {
    case "welcome":
      screenEl = <WelcomeScreen onJoin={() => setScreen("numpad")} onCreate={() => setScreen("numpad")}/>;
      break;
    case "numpad":
      screenEl = <NumpadScreen onBack={() => setScreen("welcome")} onDone={c => { setRoomCode(c); setScreen("lang"); }}/>;
      break;
    case "lang":
      screenEl = <LangScreen onBack={() => setScreen("numpad")} onDone={l => { setViewerLang(l); setScreen("board"); }}/>;
      break;
    case "board":
      screenEl = <BoardScreen
        roomCode={roomCode} viewerLang={viewerLang} role={role}
        onWrite={() => setModalOpen(true)}
        onBack={() => setScreen("welcome")}
        onOpenInterpreter={() => setInterpreterOpen(true)}
        onOpenDiscussion={openDiscussion}
        onOpenGameRoom={() => setGameRoomOpen(true)}
      />;
      break;
    default: screenEl = null;
  }

  return (
    <div style={{ width: "100%", height: "100%", position: "relative", overflow: "hidden" }}>
      {screenEl}
      {tweaksOn && (
        <TweaksPanel
          role={role} setRole={setRole}
          discussionView={discussionView} setDiscussionView={setDiscussionView}
          viewerLang={viewerLang} setViewerLang={setViewerLang}
        />
      )}
      {screen === "board" && (
        <>
          <InterpreterDrawer open={interpreterOpen} onClose={() => setInterpreterOpen(false)} viewerLang={viewerLang}/>
          {window.GameRoom && <window.GameRoom open={gameRoomOpen} onClose={() => setGameRoomOpen(false)} viewerLang={viewerLang}/>}
          <PostModal open={modalOpen} onClose={() => setModalOpen(false)} onSent={() => setModalOpen(false)}/>

          {/* 💭 Discussion overlays */}
          <DiscussionCreateSheet
            open={discussionView === "create"}
            onClose={closeDiscussion}
            onStart={(t, b) => handleStartSession(t, b)}
          />
          {(discussionView === "submit" || discussionView === "submitted") && (
            <StudentSubmitView
              session={SAMPLE_SESSION}
              viewerLang={viewerLang}
              onClose={closeDiscussion}
              submitted={discussionView === "submitted"}
              onSubmit={handleSubmitResponse}
              myResponse={myResponseText}
            />
          )}
          {discussionView === "live-teacher" && (
            <TeacherLivePanel
              session={SAMPLE_SESSION}
              viewerLang={viewerLang}
              responses={responses}
              presence={presence}
              onClose={closeDiscussion}
              onRevealTree={handleRevealTree}
            />
          )}
          {discussionView === "reveal" && (
            <FruitTreeReveal
              session={SAMPLE_SESSION}
              responses={responses}
              viewerLang={viewerLang}
              onClose={closeDiscussion}
            />
          )}
        </>
      )}
      <style>{`
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes typingDot {
          0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
          30% { transform: translateY(-4px); opacity: 1; }
        }
        @keyframes wave {
          from { height: 6px; } to { height: 44px; }
        }
        @keyframes recPulse {
          0%, 100% { box-shadow: 0 12px 28px rgba(239,68,68,0.5), inset 0 -4px 0 rgba(0,0,0,0.15), 0 0 0 0 rgba(239,68,68,0.6); }
          50% { box-shadow: 0 12px 28px rgba(239,68,68,0.5), inset 0 -4px 0 rgba(0,0,0,0.15), 0 0 0 14px rgba(239,68,68,0); }
        }
        @keyframes fruitPop {
          0% { opacity: 0; }
          60% { opacity: 1; }
          100% { opacity: 1; }
        }
        .fruit-drop { animation-name: fruitPop; }
      `}</style>
    </div>
  );
}

window.Prototype = Prototype;


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Prototype/>);
</script>
